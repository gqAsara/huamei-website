# Primary keyword registry — Huamei
#
# Source of truth for keywords the SEO loop tracks. See README.md.
#
# Two tiers:
#  1. HEAD terms — broader queries with measurable Google volume.
#     The scorer drives most opportunity selection from these.
#  2. LONG-TAIL targets — specific queries that map to existing
#     articles. Google Ads volume often comes back null (below
#     reporting threshold). We track them for GSC rank deltas + AI
#     citation, not for raw volume.
#
# Enriched 2026-05-14 against Google Ads US (location_code 2840).
# Re-enrich monthly: `npx tsx scripts/dataforseo-enrich.ts`

defaults:
  location_code: 2840       # United States
  language_code: "en"
  source: "founder + Phase 1 brief topics + DataForSEO enrichment"

keywords:
